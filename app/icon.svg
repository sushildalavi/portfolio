<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1319"/>
      <stop offset="1" stop-color="#060a13"/>
    </linearGradient>
    <linearGradient id="gold" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe066"/>
      <stop offset="1" stop-color="#d4a017"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- rounded-square plate -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" stroke="url(#gold)" stroke-opacity="0.28"/>

  <!-- top-left corner tick -->
  <path d="M 8 8 L 15 8 M 8 8 L 8 15" stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- bottom-right corner tick -->
  <path d="M 56 56 L 49 56 M 56 56 L 56 49" stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- SD monogram -->
  <text x="32" y="45"
        text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="900"
        font-size="28"
        letter-spacing="-1.5"
        fill="url(#gold)"
        filter="url(#glow)">SD</text>
</svg>
